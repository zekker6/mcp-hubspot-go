version: '3'

vars:
  GIT_COMMIT:
    sh: git rev-parse HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date --iso-8601=seconds

tasks:
  default:
    cmds:
      - task --list-all

  lint:
    deps:
      - vet
      - fmt
      - golangci

  vet:
    cmds:
      - go vet ./...

  fmt:
    cmds:
      - gofmt -l -w -s ./

  golangci:
    cmds:
      - golangci-lint run

  test:
    cmds:
      - go test -short ./...

  e2e:
    desc: Run end-to-end tests (in-process MCP client against fake HubSpot)
    cmds:
      - go test -v -run TestE2E ./internal/tools/...

  test:all:
    desc: Run all tests (unit + e2e)
    deps:
      - build
    cmds:
      - go test ./...

  build:
    cmds:
      - go build -ldflags "-X main.commit={{.GIT_COMMIT}} -X main.date={{.BUILD_DATE}}" -o tmp/mcp-hubspot ./cmd/mcp-hubspot

  run:
    desc: Run server in stdio mode
    cmds:
      - go run ./cmd/mcp-hubspot

  run-http:
    desc: Run server in HTTP mode
    cmds:
      - go run ./cmd/mcp-hubspot -mode=http -httpListenAddr=:8012

  mcp:inspector:
    cmds:
      - mcp-inspector --config inspector-config.json --server mcp-hubspot
